<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report — Indra CTI</title>
  <!-- Iosevka font (typeof.net) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/iosevka@30.3.0/dist/iosevka.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/iosevka@30.3.0/dist/iosevka-term.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .report-content { max-width: 860px; }
    .report-content h1 { font-size: 2rem; margin-bottom: 8px; }
    .report-content h2 { font-size: 1.5rem; margin-top: 32px; margin-bottom: 12px; color: var(--text); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .report-content h3 { font-size: 1.2rem; margin-top: 24px; margin-bottom: 8px; color: var(--text); }
    .report-content p { color: var(--text-sec); line-height: 1.8; margin-bottom: 16px; font-size: 0.95rem; }
    .report-content ul, .report-content ol { color: var(--text-sec); margin-bottom: 16px; padding-left: 24px; }
    .report-content li { margin-bottom: 6px; line-height: 1.7; font-size: 0.92rem; }
    .report-content code { background: var(--bg-secondary); padding: 2px 8px; border-radius: 5px; font-size: 0.85rem; color: var(--blue); }
    .report-content pre { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; overflow-x: auto; margin-bottom: 16px; }
    .report-content pre code { background: none; padding: 0; color: var(--text-sec); font-size: 0.82rem; line-height: 1.6; }
    .report-content blockquote { border-left: 3px solid var(--blue); padding: 12px 16px; background: rgba(59, 130, 246, 0.05); border-radius: 0 8px 8px 0; margin-bottom: 16px; }
    .report-content blockquote p { margin: 0; color: var(--text-sec); }
    .report-content img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); margin: 16px 0; background: var(--bg-secondary); }
    .report-content a { color: var(--blue); text-decoration: underline; }
    .report-content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    .report-content table th { background: var(--bg-secondary); color: var(--text-muted); padding: 10px 14px; text-align: left; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
    .report-content table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-sec); font-size: 0.9rem; }
    .report-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .report-content strong { color: var(--text); font-weight: 700; }
    .report-content em { color: var(--text-sec); }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 24px;
      cursor: pointer;
      transition: color 0.2s;
      text-decoration: none;
    }
    .back-btn:hover { color: var(--blue); }
    .back-btn i { width: 16px; height: 16px; }

    .report-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .report-meta span { font-size: 0.82rem; color: var(--text-muted); }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      color: var(--text-muted);
    }
    .loading-state .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>Indra CTI</h2>
      <small>by Peris.ai</small>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-label">Overview</div>
      <a href="index.html" class="sidebar-link"><span class="icon"><i data-lucide="layout-dashboard"></i></span> Dashboard</a>
      <div class="sidebar-label">Threat Intel</div>
      <a href="feeds.html" class="sidebar-link"><span class="icon"><i data-lucide="crosshair"></i></span> IOC Feeds</a>
      <a href="reports.html" class="sidebar-link active"><span class="icon"><i data-lucide="clipboard-list"></i></span> Reports</a>
      <div class="sidebar-label">Data</div>
      <a href="download.html" class="sidebar-link"><span class="icon"><i data-lucide="download"></i></span> Downloads</a>
    </nav>
    <div class="sidebar-footer">
      <a href="https://github.com/perisai-labs/indra-cti" target="_blank">
        <i data-lucide="github" style="width:14px;height:14px;"></i> GitHub Repository
      </a>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <div class="header-title">
        <h1>Report Detail</h1>
        <p id="report-subtitle">Loading report...</p>
      </div>
    </header>
    <div class="content">

      <a href="reports.html" class="back-btn">
        <i data-lucide="arrow-left"></i> Back to Reports
      </a>

      <div class="report-content" id="report-content">
        <div class="loading-state">
          <div class="spinner"></div>
          <div>Loading report...</div>
        </div>
      </div>

    </div>
    <div class="footer">
      Indra CTI — Open-Source Threat Intelligence Platform by <a href="https://peris.ai" target="_blank">Peris.ai</a> · <a href="https://github.com/perisai-labs/indra-cti" target="_blank">GitHub</a> · CC BY 4.0
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  loadReport();
});

async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const reportPath = params.get('file');
  const reportId = params.get('id');

  if (!reportPath && !reportId) {
    showReportContent('<h2>No report selected</h2><p style="color:var(--text-muted)">Please select a report from the <a href="reports.html">Reports page</a>.</p>');
    return;
  }

  const mdUrl = reportPath || `https://raw.githubusercontent.com/perisai-labs/indra-cti/master/reports/${reportId}/README.md`;

  try {
    const resp = await fetch(mdUrl);
    if (!resp.ok) throw new Error('Report not found');
    const md = await resp.text();

    // Get report metadata from URL
    const pathParts = (reportPath || '').split('/').filter(Boolean);
    const reportName = pathParts[pathParts.length - 1]?.replace('.md', '') || reportId || '';
    const dateMatch = reportName.match(/^(\d{4}-\d{2}-\d{2})/);
    const reportDate = dateMatch ? dateMatch[1] : '';

    // Extract title (first h1 or h2)
    const titleMatch = md.match(/^#\s+(.+)$/m) || md.match(/^##\s+(.+)$/m);
    const title = titleMatch ? titleMatch[1].trim() : reportName.replace(/-/g, ' ');

    // Convert base path for images
    const basePath = reportPath
      ? reportPath.replace(/\/[^/]+$/, '') // remove filename
      : `https://raw.githubusercontent.com/perisai-labs/indra-cti/master/reports/${reportId}`;

    const html = markdownToHtml(md, basePath);
    document.getElementById('report-subtitle').textContent = reportDate + ' — ' + (pathParts[0]?.toUpperCase() || '');
    document.title = title + ' — Indra CTI';

    showReportContent(`
      <h1>${escapeHtml(title)}</h1>
      <div class="report-meta">
        <span><i data-lucide="calendar" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"></i>${reportDate}</span>
        <span class="tag tag-muted">CTI Report</span>
      </div>
      ${html}
    `);
    lucide.createIcons();
  } catch (err) {
    showReportContent(`
      <h2>Failed to load report</h2>
      <p style="color:var(--text-muted)">${escapeHtml(err.message)}</p>
      <p style="color:var(--text-muted);font-size:0.85rem;">Trying alternative URL...</p>
    `);

    // Try alternate paths
    const altPaths = [
      `https://raw.githubusercontent.com/perisai-labs/indra-cti/master/reports/${reportId}.md`,
      `https://raw.githubusercontent.com/perisai-labs/indra-cti/master/reports/${reportId}/${reportId}.md`,
    ];

    for (const altUrl of altPaths) {
      try {
        const resp = await fetch(altUrl);
        if (!resp.ok) continue;
        const md = await resp.text();
        const html = markdownToHtml(md, `https://raw.githubusercontent.com/perisai-labs/indra-cti/master/reports/${reportId}`);
        const titleMatch = md.match(/^#\s+(.+)$/m) || md.match(/^##\s+(.+)$/m);
        const title = titleMatch ? titleMatch[1].trim() : reportId.replace(/-/g, ' ');
        document.getElementById('report-subtitle').textContent = reportId.toUpperCase();
        document.title = title + ' — Indra CTI';
        showReportContent(`<h1>${escapeHtml(title)}</h1>${html}`);
        lucide.createIcons();
        return;
      } catch (e) { continue; }
    }

    showReportContent(`
      <h2>Report not found</h2>
      <p style="color:var(--text-muted)">Could not load the report. It may have been moved or deleted.</p>
      <p style="margin-top:16px;"><a href="reports.html" class="btn btn-primary">Back to Reports</a></p>
    `);
  }
}

function showReportContent(html) {
  document.getElementById('report-content').innerHTML = html;
}

function markdownToHtml(md, basePath) {
  // Convert image paths to raw GitHub URLs
  md = md.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
    if (!src.startsWith('http')) {
      // Relative path
      src = src.replace(/^\.?\//, '');
      if (basePath) {
        if (!basePath.startsWith('http')) {
          src = basePath + '/' + src;
        } else {
          src = basePath + '/' + src;
        }
      } else {
        src = 'https://raw.githubusercontent.com/perisai-labs/indra-cti/master/' + src;
      }
    }
    return `<img src="${src}" alt="${escapeHtml(alt)}" loading="lazy">`;
  });

  // Code blocks
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    return `<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`;
  });

  // Inline code
  md = md.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  md = md.replace(/^(?!<{2})# (.+)$/gm, '<h1>$1</h1>');

  // Bold + Italic
  md = md.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Blockquotes
  md = md.replace(/^>\s+(.+)$/gm, '<blockquote><p>$1</p></blockquote>');

  // Horizontal rules
  md = md.replace(/^---$/gm, '<hr>');

  // Tables
  md = md.replace(/^\|(.+)\|$/gm, (match, content) => {
    const cells = content.split('|').map(c => c.trim());
    if (cells.every(c => /^[-:]+$/.test(c))) {
      return '<!--TABLE_SEP-->';
    }
    return `<tr>${cells.map(c => `<td>${c}</td>`).join('')}</tr>`;
  });
  md = md.replace(/((?:<tr>.*?<\/tr>\n?)+)/g, (match) => {
    const rows = match.trim().split('\n');
    let html = '<table>';
    rows.forEach((row, i) => {
      if (i === 0) {
        html = row.replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>');
      } else if (row === '<!--TABLE_SEP-->') {
        // skip separator
      } else {
        html += row;
      }
    });
    html += '</table>';
    return html;
  });

  // Unordered lists
  md = md.replace(/^(\s*)[-*] (.+)$/gm, (m, indent, content) => {
    return `<li>${content}</li>`;
  });
  md = md.replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Ordered lists
  md = md.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
  md = md.replace(/((?:<oli>.*?<\/oli>\n?)+)/g, (m) => {
    return '<ol>' + m.replace(/<\/?oli>/g, (t) => t.replace('oli', 'li')) + '</ol>';
  });

  // Links (not images)
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Paragraphs (lines that aren't HTML tags)
  md = md.replace(/^(?!<[a-z/])((?!<).+)$/gm, '<p>$1</p>');

  // Clean up double newlines
  md = md.replace(/\n{2,}/g, '\n\n');

  return md;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
