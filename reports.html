let filtered = [...reports];

document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  document.getElementById('filter-year').addEventListener('change', applyFilters);
  document.getElementById('filter-type').addEventListener('change', applyFilters);
  document.getElementById('count-reports').textContent = reports.length;
  document.getElementById('report-total').textContent = reports.length + ' reports';
  renderReports();

  // IOC count
  fetchCSV('https://raw.githubusercontent.com/perisai-labs/indra-cti/master/feeds/ioc-all.csv').then(d => {
    if (d.length) document.getElementById('count-iocs').textContent = d.length;
  }).catch(() => {});
});

function applyFilters() {
  const y = document.getElementById('filter-year').value;
  const t = document.getElementById('filter-type').value;
  filtered = reports.filter(r => {
    const yr = r.date.split('-')[0];
    return (!y || yr === y) && (!t || r.type === t);
  });
  renderReports();
  document.getElementById('report-total').textContent = filtered.length + ' reports';
}

function renderReports() {
  const el = document.getElementById('reports-list');
  const sevTag = r => `tag tag-${r === 'critical' ? 'red' : r === 'high' ? 'amber' : r === 'medium' ? 'blue' : 'muted'}`;
  const typeTag = t => `tag tag-${t === 'apt' ? 'purple' : t === 'ransomware' ? 'red' : t === 'rat' ? 'orange' : t === 'stealer' ? 'blue' : t === 'botnet' ? 'red' : t === 'cryptominer' ? 'green' : 'muted'}`;

  el.innerHTML = filtered
    .sort((a, b) => b.date.localeCompare(a.date))
    .map(r => {
      const detailUrl = `report.html?id=${encodeURIComponent((r.folder ? r.folder : r.file).replace(/\.md$/,''))}`;
      return `
    <div class="report-card" onclick="window.location.href='${detailUrl}'">
      <h3>${r.title}</h3>
      <div class="meta">
        <span>${r.date}</span>
        <span class="${sevTag(r.sev)}">${r.sev}</span>
        <span class="${typeTag(r.type)}">${r.type}</span>
      </div>
      <div class="tags">
        <span class="tag tag-muted">${r.type}</span>
      </div>
    </div>`;
    }).join('');

  if (!filtered.length) el.innerHTML = '<div style="padding:48px;text-align:center;color:var(--text-muted);">No reports found matching your filters.</div>';
}

async function fetchCSV(url) {
  const r = await fetch(url);
  const t = await r.text();
  return t.split('\n').filter(l => l.trim());
}
