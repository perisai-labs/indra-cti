<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Indra CTI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>Indra CTI</h2>
      <small>by Peris.ai</small>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-label">Overview</div>
      <a href="index.html" class="sidebar-link"><span class="icon"><i data-lucide="layout-dashboard"></i></span> Dashboard</a>
      <div class="sidebar-label">Threat Intel</div>
      <a href="feeds.html" class="sidebar-link">
        <span class="icon"><i data-lucide="crosshair"></i></span> IOC Feeds
        <span class="badge-count" id="count-iocs"></span>
      </a>
      <a href="reports.html" class="sidebar-link active">
        <span class="icon"><i data-lucide="clipboard-list"></i></span> Reports
      </a>
      <div class="sidebar-label">Data</div>
      <a href="download.html" class="sidebar-link"><span class="icon"><i data-lucide="download"></i></span> Downloads</a>
    </nav>
    <div class="sidebar-footer">
      <a href="https://github.com/perisai-labs/indra-cti" target="_blank">
        <i data-lucide="github" style="width:14px;height:14px;"></i> GitHub Repository
      </a>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <div class="header-title">
        <h1>Research Reports</h1>
        <p>Malware analysis and threat intelligence reports</p>
      </div>
    </header>
    <div class="content">

      <div class="filters">
        <select class="filter-select" id="filter-year">
          <option value="">All Years</option>
          <option value="2026">2026</option>
          <option value="2025">2025</option>
        </select>
        <select class="filter-select" id="filter-type">
          <option value="">All Types</option>
          <option value="malware">Malware</option>
          <option value="ransomware">Ransomware</option>
          <option value="apt">APT</option>
          <option value="analysis">Analysis</option>
        </select>
      </div>

      <div id="reports-list" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;"></div>
    </div>
    <div class="footer">
      Indra CTI — Open-Source Threat Intelligence Platform by <a href="https://peris.ai" target="_blank">Peris.ai</a> · <a href="https://github.com/perisai-labs/indra-cti" target="_blank">GitHub</a> · CC BY 4.0
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
const reports = [
  { id: 'agenttesla-stegano', date: '2026-02-11', title: 'AgentTesla Steganography Loader', desc: 'Sophisticated steganography-based AgentTesla loader variant using image embedding techniques.', type: 'malware', tags: ['infostealer','stegano','loader','dotnet'], sev: 'high' },
  { id: 'mirai-variant', date: '2026-02-12', title: 'Mirai Botnet Variant', desc: 'New Mirai IoT botnet variant with enhanced C2 capabilities and persistence mechanisms.', type: 'malware', tags: ['botnet','mirai','iot','ddos'], sev: 'critical' },
  { id: 'crysome-rat', date: '2026-02-15', title: 'Crysome RAT Technical Breakdown', desc: 'Detailed reverse engineering of Crysome RAT targeting Southeast Asian organizations.', type: 'malware', tags: ['rat','remoteaccess','sea','crimeware'], sev: 'high' },
  { id: 'stealc-infostealer', date: '2026-02-16', title: 'Stealc Information Stealer', desc: 'Comprehensive analysis of Stealc stealer targeting browser credentials and crypto wallets.', type: 'malware', tags: ['infostealer','credentials','wallets'], sev: 'high' },
  { id: '0apt-ransomware', date: '2026-02-19', title: '0APT Ransomware Operation', desc: 'Analysis of 0APT ransomware group operations, infrastructure, and attribution indicators.', type: 'ransomware', tags: ['ransomware','0apt','encryption'], sev: 'critical' },
  { id: 'xworm-rat', date: '2026-02-20', title: 'XWorm RAT Campaign', desc: 'Multi-stage analysis of XWorm RAT distribution infrastructure and C2 communication.', type: 'malware', tags: ['rat','xworm','c2','crimeware'], sev: 'high' },
  { id: 'pureminer', date: '2026-02-21', title: 'PureMiner Cryptocurrency Miner', desc: 'Technical analysis of PureMiner cryptomining malware targeting Linux servers.', type: 'analysis', tags: ['cryptominer','linux','performance'], sev: 'medium' },
  { id: 'mirai-titanjr', date: '2026-02-22', title: 'Mirai TitanJR ARC Analysis', desc: 'Reverse engineering of Mirai TitanJR variant targeting ARC architecture devices.', type: 'malware', tags: ['mirai','arc','iot','credentials'], sev: 'high' },
];

let filtered = [...reports];

document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  document.getElementById('filter-year').addEventListener('change', applyFilters);
  document.getElementById('filter-type').addEventListener('change', applyFilters);
  renderReports();
  // Also update ioc count in sidebar
  fetchCSV('https://raw.githubusercontent.com/perisai-labs/indra-cti/master/feeds/ioc-all.csv').then(d => {
    if (d.length) document.getElementById('count-iocs').textContent = d.length.toLocaleString();
  }).catch(() => {});
});

function applyFilters() {
  const y = document.getElementById('filter-year').value;
  const t = document.getElementById('filter-type').value;
  filtered = reports.filter(r => {
    const yr = r.date.split('-')[0];
    return (!y || yr === y) && (!t || r.type === t);
  });
  renderReports();
}

function renderReports() {
  const el = document.getElementById('reports-list');
  const tagColor = { infostealer: 'blue', stegano: 'purple', loader: 'amber', botnet: 'red', rat: 'red', ransomware: 'red', cryptominer: 'green', mirai: 'red' };
  const tagColorDefault = 'muted';
  const sevClass = r => `tag tag-${r === 'critical' ? 'red' : r === 'high' ? 'amber' : r === 'medium' ? 'blue' : 'muted'}`;

  el.innerHTML = filtered
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .map(r => `
    <div class="report-card">
      <h3>${r.title}</h3>
      <div class="meta">
        <span>${r.date}</span>
        <span class="${sevClass(r.sev)}">${r.sev}</span>
        <span class="tag tag-muted">${r.type}</span>
      </div>
      <div class="desc">${r.desc}</div>
      <div class="tags">
        ${r.tags.map(tg => `<span class="tag tag-${tagColor[tg] || tagColorDefault}">${tg}</span>`).join('')}
      </div>
      <div style="margin-top:16px;">
        <a href="https://github.com/perisai-labs/indra-cti/tree/master/reports" target="_blank" style="font-size:0.85rem;color:var(--blue);font-weight:600;">View Full Report →</a>
      </div>
    </div>
  `).join('');

  if (!filtered.length) el.innerHTML = '<div style="padding:48px;text-align:center;color:var(--text-muted);">No reports found matching your filters.</div>';
}

async function fetchCSV(url) {
  const r = await fetch(url);
  const t = await r.text();
  return t.split('\n').length - 1;
}
</script>
</body>
</html>
